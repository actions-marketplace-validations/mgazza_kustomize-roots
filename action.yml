name: kustomize-roots
description: Find and optionally build root kustomization files in a directory tree
branding:
  icon: git-branch
  color: blue

inputs:
  directory:
    description: Directory to scan for kustomization files
    required: false
    default: "."
  build:
    description: Build each root via kustomize build
    required: false
    default: "false"
  output-dir:
    description: Write build output to files instead of stdout
    required: false
    default: ""
  json:
    description: Output root paths as JSON array
    required: false
    default: "false"
  exclude:
    description: Glob patterns to skip directories (space-separated)
    required: false
    default: ".git"
  mode:
    description: "Operating mode: build (default), artifact, or pr-branch"
    required: false
    default: "build"
  base-ref:
    description: "Base git ref for diff modes (default: base ref from PR event)"
    required: false
    default: ""
  rendered-branch:
    description: Orphan branch name for pr-branch mode
    required: false
    default: "rendered"

outputs:
  roots:
    description: Newline-separated list of root kustomization paths
    value: ${{ steps.run.outputs.roots }}
  roots-json:
    description: JSON array of root kustomization paths
    value: ${{ steps.run.outputs.roots-json }}
  diff:
    description: Unified diff text (artifact/pr-branch modes)
    value: ${{ steps.diff.outputs.diff }}
  has-changes:
    description: Whether rendered manifests changed (artifact/pr-branch modes)
    value: ${{ steps.diff.outputs.has-changes }}
  shadow-pr:
    description: Shadow PR number (pr-branch mode only)
    value: ${{ steps.shadow-pr.outputs.number }}

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version: "1.21"

    - name: Build kustomize-roots
      shell: bash
      working-directory: ${{ github.action_path }}
      run: go build -o ${{ github.action_path }}/kustomize-roots .

    # ---- build mode (default) ----
    - name: Run kustomize-roots
      id: run
      if: inputs.mode == 'build'
      shell: bash
      run: |
        ARGS=""
        if [ "${{ inputs.build }}" = "true" ]; then
          ARGS="$ARGS -build"
        fi
        if [ -n "${{ inputs.output-dir }}" ]; then
          ARGS="$ARGS -output-dir ${{ inputs.output-dir }}"
        fi
        for pattern in ${{ inputs.exclude }}; do
          ARGS="$ARGS -exclude $pattern"
        done

        ROOTS=$(${{ github.action_path }}/kustomize-roots $ARGS "${{ inputs.directory }}")
        echo "roots<<EOF" >> "$GITHUB_OUTPUT"
        echo "$ROOTS" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

        ROOTS_JSON=$(${{ github.action_path }}/kustomize-roots -json $ARGS "${{ inputs.directory }}")
        echo "roots-json<<EOF" >> "$GITHUB_OUTPUT"
        echo "$ROOTS_JSON" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    # ---- artifact mode ----
    # Permissions required: contents: write, pull-requests: write
    - name: Resolve base ref
      id: base-ref
      if: inputs.mode == 'artifact'
      shell: bash
      run: |
        BASE_REF="${{ inputs.base-ref }}"
        if [ -z "$BASE_REF" ]; then
          BASE_REF="${{ github.event.pull_request.base.sha }}"
        fi
        if [ -z "$BASE_REF" ]; then
          echo "::error::base-ref is required for artifact mode (or run on a pull_request event)"
          exit 1
        fi
        echo "ref=$BASE_REF" >> "$GITHUB_OUTPUT"

    - name: Render base manifests
      if: inputs.mode == 'artifact'
      shell: bash
      run: |
        EXCLUDE_ARGS=""
        for pattern in ${{ inputs.exclude }}; do
          EXCLUDE_ARGS="$EXCLUDE_ARGS -exclude $pattern"
        done

        CHANGED_FILES=$(git diff --name-only ${{ steps.base-ref.outputs.ref }} HEAD | tr '\n' ' ')

        git worktree add /tmp/kustomize-base-tree ${{ steps.base-ref.outputs.ref }}
        cd /tmp/kustomize-base-tree
        ${{ github.action_path }}/kustomize-roots -build -output-dir /tmp/kustomize-base -changed-files "$CHANGED_FILES" $EXCLUDE_ARGS "${{ inputs.directory }}"

    - name: Render head manifests
      if: inputs.mode == 'artifact'
      shell: bash
      run: |
        EXCLUDE_ARGS=""
        for pattern in ${{ inputs.exclude }}; do
          EXCLUDE_ARGS="$EXCLUDE_ARGS -exclude $pattern"
        done

        CHANGED_FILES=$(git diff --name-only ${{ steps.base-ref.outputs.ref }} HEAD | tr '\n' ' ')

        mkdir -p /tmp/kustomize-head
        ${{ github.action_path }}/kustomize-roots -build -output-dir /tmp/kustomize-head -changed-files "$CHANGED_FILES" $EXCLUDE_ARGS "${{ inputs.directory }}"

    - name: Generate diffs
      id: diff
      if: inputs.mode == 'artifact'
      shell: bash
      run: |
        ${{ github.action_path }}/kustomize-roots diff -format html /tmp/kustomize-base /tmp/kustomize-head > /tmp/kustomize-diff.html || true
        ${{ github.action_path }}/kustomize-roots diff /tmp/kustomize-base /tmp/kustomize-head > /tmp/kustomize-diff.diff || true

        if [ -s /tmp/kustomize-diff.diff ]; then
          ADDED=$(grep -c '^+' /tmp/kustomize-diff.diff || true)
          REMOVED=$(grep -c '^-' /tmp/kustomize-diff.diff || true)
          FILES=$(grep -c '^--- ' /tmp/kustomize-diff.diff || true)
          echo "has-changes=true" >> "$GITHUB_OUTPUT"
          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "removed=$REMOVED" >> "$GITHUB_OUTPUT"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/kustomize-diff.diff >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        else
          echo "has-changes=false" >> "$GITHUB_OUTPUT"
          echo "diff=" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload diff artifacts
      if: inputs.mode == 'artifact' && steps.diff.outputs.has-changes == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: kustomize-diff
        path: |
          /tmp/kustomize-diff.html
          /tmp/kustomize-diff.diff

    - name: Publish diff to GitHub Pages
      id: pages
      if: inputs.mode == 'artifact' && steps.diff.outputs.has-changes == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        PAGES_DIR="/tmp/kustomize-pages"

        git config user.name "kustomize-roots[bot]"
        git config user.email "kustomize-roots[bot]@users.noreply.github.com"

        # Ensure gh-pages branch exists.
        if git ls-remote --exit-code origin refs/heads/gh-pages >/dev/null 2>&1; then
          git fetch origin gh-pages
          git worktree add "$PAGES_DIR" origin/gh-pages
          cd "$PAGES_DIR"
          git checkout -B gh-pages origin/gh-pages
        else
          git worktree add --detach "$PAGES_DIR"
          cd "$PAGES_DIR"
          git checkout --orphan gh-pages
          git rm -rf . 2>/dev/null || true
          git commit --allow-empty -m "Initialize gh-pages branch"
        fi

        # Copy diff HTML.
        mkdir -p "diffs/pr-${PR_NUMBER}"
        cp /tmp/kustomize-diff.html "diffs/pr-${PR_NUMBER}/index.html"
        git add "diffs/pr-${PR_NUMBER}/index.html"

        if ! git diff --cached --quiet; then
          git commit -m "Update diff report for PR #${PR_NUMBER}"
          git push origin gh-pages
        fi

        # Resolve Pages URL.
        PAGES_BASE=$(gh api "repos/${{ github.repository }}/pages" --jq '.html_url' 2>/dev/null || true)
        if [ -z "$PAGES_BASE" ]; then
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)
          PAGES_BASE="https://${{ github.repository_owner }}.github.io/${REPO_NAME}"
        fi
        echo "url=${PAGES_BASE%/}/diffs/pr-${PR_NUMBER}/" >> "$GITHUB_OUTPUT"

    - name: Comment on PR
      if: inputs.mode == 'artifact' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        COMMENT_FILE=$(mktemp)

        if [ "${{ steps.diff.outputs.has-changes }}" = "true" ]; then
          echo "### Kustomize Diff Summary" >> "$COMMENT_FILE"
          echo "" >> "$COMMENT_FILE"
          echo "**${{ steps.diff.outputs.files }}** file(s) changed — **+${{ steps.diff.outputs.added }}** added, **-${{ steps.diff.outputs.removed }}** removed" >> "$COMMENT_FILE"

          # Link to interactive HTML report on Pages.
          PAGES_URL="${{ steps.pages.outputs.url }}"
          if [ -n "$PAGES_URL" ]; then
            echo "" >> "$COMMENT_FILE"
            echo "**[View interactive diff report](${PAGES_URL})**" >> "$COMMENT_FILE"
          fi

          # Include inline diff in collapsible block.
          DIFF_SIZE=$(wc -c < /tmp/kustomize-diff.diff | tr -d ' ')
          if [ "$DIFF_SIZE" -le 60000 ]; then
            {
              echo ""
              echo "<details>"
              echo "<summary>Diff</summary>"
              echo ""
              echo '```diff'
              cat /tmp/kustomize-diff.diff
              echo '```'
              echo ""
              echo "</details>"
            } >> "$COMMENT_FILE"
          else
            {
              echo ""
              echo "<details>"
              echo "<summary>Diff (truncated)</summary>"
              echo ""
              echo '```diff'
              head -c 60000 /tmp/kustomize-diff.diff
              echo ""
              echo "... (truncated, download artifact for full diff)"
              echo '```'
              echo ""
              echo "</details>"
            } >> "$COMMENT_FILE"
          fi

          echo "" >> "$COMMENT_FILE"
          echo "Download the [diff artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the full HTML report." >> "$COMMENT_FILE"
        else
          echo "### Kustomize Diff Summary" >> "$COMMENT_FILE"
          echo "" >> "$COMMENT_FILE"
          echo "No changes to rendered manifests." >> "$COMMENT_FILE"
        fi

        gh pr comment "${{ github.event.pull_request.number }}" --body-file "$COMMENT_FILE"
        rm -f "$COMMENT_FILE"

    - name: Cleanup worktrees (artifact)
      if: inputs.mode == 'artifact' && always()
      shell: bash
      run: |
        git worktree remove /tmp/kustomize-base-tree --force 2>/dev/null || true
        git worktree remove /tmp/kustomize-pages --force 2>/dev/null || true

    # ---- pr-branch mode ----
    # Permissions required: contents: write, pull-requests: write
    - name: Configure git identity (pr-branch)
      if: inputs.mode == 'pr-branch'
      shell: bash
      run: |
        git config user.name "kustomize-roots[bot]"
        git config user.email "kustomize-roots[bot]@users.noreply.github.com"

    - name: Resolve base ref (pr-branch)
      id: pr-base-ref
      if: inputs.mode == 'pr-branch' && github.event.action != 'closed'
      shell: bash
      run: |
        BASE_REF="${{ inputs.base-ref }}"
        if [ -z "$BASE_REF" ]; then
          BASE_REF="${{ github.event.pull_request.base.sha }}"
        fi
        if [ -z "$BASE_REF" ]; then
          echo "::error::base-ref is required for pr-branch mode (or run on a pull_request event)"
          exit 1
        fi
        echo "ref=$BASE_REF" >> "$GITHUB_OUTPUT"

    - name: Render head manifests (pr-branch)
      if: inputs.mode == 'pr-branch' && github.event.action != 'closed'
      shell: bash
      run: |
        EXCLUDE_ARGS=""
        for pattern in ${{ inputs.exclude }}; do
          EXCLUDE_ARGS="$EXCLUDE_ARGS -exclude $pattern"
        done

        mkdir -p /tmp/kustomize-head
        ${{ github.action_path }}/kustomize-roots -build -output-dir /tmp/kustomize-head $EXCLUDE_ARGS "${{ inputs.directory }}"

    - name: Ensure rendered branch exists
      if: inputs.mode == 'pr-branch' && github.event.action != 'closed'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        RENDERED="${{ inputs.rendered-branch }}"

        # Check if the rendered branch exists on remote.
        if git ls-remote --exit-code origin "refs/heads/$RENDERED" >/dev/null 2>&1; then
          echo "Rendered branch '$RENDERED' already exists."
          exit 0
        fi

        echo "Creating orphan rendered branch '$RENDERED' from base ref..."

        # Render base manifests into a temp dir.
        EXCLUDE_ARGS=""
        for pattern in ${{ inputs.exclude }}; do
          EXCLUDE_ARGS="$EXCLUDE_ARGS -exclude $pattern"
        done

        git worktree add /tmp/kustomize-rendered-init ${{ steps.pr-base-ref.outputs.ref }}
        mkdir -p /tmp/kustomize-rendered-base
        (cd /tmp/kustomize-rendered-init && ${{ github.action_path }}/kustomize-roots -build -output-dir /tmp/kustomize-rendered-base $EXCLUDE_ARGS "${{ inputs.directory }}")

        # Create orphan branch with rendered files.
        git worktree add --detach /tmp/kustomize-rendered-orphan
        cd /tmp/kustomize-rendered-orphan
        git checkout --orphan "$RENDERED"
        git rm -rf . 2>/dev/null || true
        cp /tmp/kustomize-rendered-base/*.yaml . 2>/dev/null || true
        if [ -n "$(ls *.yaml 2>/dev/null)" ]; then
          git add *.yaml
          git commit -m "Initial rendered manifests from $(git rev-parse --short ${{ steps.pr-base-ref.outputs.ref }})"
        else
          git commit --allow-empty -m "Initial rendered branch (no manifests)"
        fi
        git push origin "$RENDERED"

    - name: Create or update shadow branch
      id: shadow-branch
      if: inputs.mode == 'pr-branch' && github.event.action != 'closed'
      shell: bash
      run: |
        RENDERED="${{ inputs.rendered-branch }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"
        SHADOW_BRANCH="${RENDERED}-pr-${PR_NUMBER}"

        # Fetch the rendered branch.
        git fetch origin "$RENDERED"

        # Create the shadow branch from rendered.
        git worktree add /tmp/kustomize-shadow "origin/$RENDERED"
        cd /tmp/kustomize-shadow
        git checkout -B "$SHADOW_BRANCH"

        # Replace contents with head-rendered manifests.
        rm -f *.yaml 2>/dev/null || true
        cp /tmp/kustomize-head/*.yaml . 2>/dev/null || true

        # Commit and push.
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to rendered manifests."
          echo "has-changes=false" >> "$GITHUB_OUTPUT"
        else
          git commit -m "Rendered manifests for PR #$PR_NUMBER - ${{ github.event.pull_request.title }} (${{ github.sha }})"
          git push -f origin "$SHADOW_BRANCH"
          echo "has-changes=true" >> "$GITHUB_OUTPUT"
        fi
        echo "branch=$SHADOW_BRANCH" >> "$GITHUB_OUTPUT"

    - name: Create or update shadow PR
      id: shadow-pr
      if: inputs.mode == 'pr-branch' && github.event.action != 'closed' && steps.shadow-branch.outputs.has-changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        RENDERED="${{ inputs.rendered-branch }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"
        SHADOW_BRANCH="${RENDERED}-pr-${PR_NUMBER}"

        # Check if shadow PR already exists.
        EXISTING=$(gh pr list --base "$RENDERED" --head "$SHADOW_BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)

        if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
          echo "Shadow PR #$EXISTING already exists, updated via force push."
          echo "number=$EXISTING" >> "$GITHUB_OUTPUT"
        else
          PR_BODY="Shadow PR showing rendered manifest diff for #$PR_NUMBER."
          PR_BODY="$PR_BODY This PR is automatically managed. Do not merge manually."
          SHADOW_URL=$(gh pr create \
            --base "$RENDERED" \
            --head "$SHADOW_BRANCH" \
            --title "Rendered: ${{ github.event.pull_request.title }}" \
            --body "$PR_BODY" 2>/dev/null || true)

          if [ -n "$SHADOW_URL" ]; then
            SHADOW_NUMBER=$(echo "$SHADOW_URL" | grep -oE '[0-9]+$')
            echo "number=$SHADOW_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Failed to create shadow PR"
          fi
        fi

    - name: Comment on source PR (pr-branch)
      if: inputs.mode == 'pr-branch' && github.event.action != 'closed' && steps.shadow-pr.outputs.number != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        SHADOW_NUMBER="${{ steps.shadow-pr.outputs.number }}"
        REPO_URL="${{ github.server_url }}/${{ github.repository }}"
        BODY="### Rendered Manifest Diff"
        BODY="$BODY"$'\n\n'"View the rendered manifest changes in the **Files Changed** tab of the shadow PR:"
        BODY="$BODY"$'\n\n'"**[Shadow PR #${SHADOW_NUMBER}](${REPO_URL}/pull/${SHADOW_NUMBER}/files)**"
        BODY="$BODY"$'\n\n'"This shows the actual Kubernetes resources that will change when this PR is merged."
        gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"

    - name: Handle source PR closed (pr-branch)
      if: inputs.mode == 'pr-branch' && github.event.action == 'closed'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        RENDERED="${{ inputs.rendered-branch }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"
        SHADOW_BRANCH="${RENDERED}-pr-${PR_NUMBER}"

        # Find the shadow PR.
        SHADOW_NUMBER=$(gh pr list --base "$RENDERED" --head "$SHADOW_BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)

        if [ -z "$SHADOW_NUMBER" ] || [ "$SHADOW_NUMBER" = "null" ]; then
          echo "No shadow PR found for $SHADOW_BRANCH, nothing to clean up."
          exit 0
        fi

        if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
          echo "Source PR merged — merging shadow PR #$SHADOW_NUMBER"
          gh pr merge "$SHADOW_NUMBER" --merge --delete-branch || echo "::warning::Failed to merge shadow PR #$SHADOW_NUMBER"
        else
          echo "Source PR closed without merge — closing shadow PR #$SHADOW_NUMBER"
          gh pr close "$SHADOW_NUMBER" --delete-branch || echo "::warning::Failed to close shadow PR #$SHADOW_NUMBER"
        fi

    - name: Cleanup worktrees (pr-branch)
      if: inputs.mode == 'pr-branch' && always()
      shell: bash
      run: |
        git worktree remove /tmp/kustomize-rendered-init --force 2>/dev/null || true
        git worktree remove /tmp/kustomize-rendered-orphan --force 2>/dev/null || true
        git worktree remove /tmp/kustomize-shadow --force 2>/dev/null || true
